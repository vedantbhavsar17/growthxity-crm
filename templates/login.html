<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Growthxity CRM</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        :root {
            --gx-primary: #6366F1;
            --gx-background: #F8FAFC;
            --gx-border: #e2e8f0;
            --gx-text: #0f172a;
            --gx-muted: #64748b;
        }

        body {
            min-height: 100vh;
            background: var(--gx-background);
            color: var(--gx-text);
        }

        .auth-shell {
            min-height: 100vh;
        }

        .auth-card {
            background: #fff;
            border: 1px solid var(--gx-border);
            border-radius: 1.5rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        .brand-title {
            color: var(--gx-primary);
        }

        .form-control {
            border-radius: 0.9rem;
            padding: 0.85rem 1rem;
            border-color: var(--gx-border);
        }

        .form-control:focus {
            border-color: var(--gx-primary);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.15);
        }

        .btn-primary,
        .btn-primary:hover,
        .btn-primary:focus {
            background-color: var(--gx-primary);
            border-color: var(--gx-primary);
            border-radius: 0.9rem;
            padding: 0.85rem 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center auth-shell">
            <div class="col-sm-10 col-md-8 col-lg-5">
                <div class="auth-card p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold brand-title mb-2">Growthxity CRM</h1>
                        <p class="text-secondary mb-0">Login to your account</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger" role="alert">{{ error }}</div>
                    {% endif %}

                    <form method="post" class="d-grid gap-3">
                        <div>
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" value="{{ form_data.email }}" class="form-control" required>
                        </div>

                        <div>
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <p class="text-center text-secondary mt-4 mb-0">
                        Don’t have an account?
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Register</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
